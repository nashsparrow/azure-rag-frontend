name: Deploy Angular to Azure VM

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: ./rag-chat-frontend
        run: npm ci

      - name: Build Angular
        working-directory: ./rag-chat-frontend
        run: npm run build -- --configuration production

      - name: Upload Angular build to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          source: "rag-chat-frontend/dist/rag-chat-frontend/browser/*"
          target: "/tmp/rag-chat-frontend"

      - name: Move files and reload Caddy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            sudo mkdir -p /var/www/rag-chat-frontend
            sudo rm -rf /var/www/rag-chat-frontend/*
            sudo cp -r /tmp/rag-chat-frontend/rag-chat-frontend/dist/rag-chat-frontend/browser/* /var/www/rag-chat-frontend/
            sudo chown -R www-data:www-data /var/www/rag-chat-frontend
            sudo systemctl reload caddy
